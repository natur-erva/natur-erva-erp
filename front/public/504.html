<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Servidor indisponível - Quinta Nicy</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111827;
      color: #f9fafb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      text-align: center;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.75rem; }
    p { color: #9ca3af; margin-bottom: 1.5rem; line-height: 1.6; max-width: 400px; }
    button {
      background: #35A754;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: 500;
    }
    button:hover { background: #2d8f47; }
  </style>
</head>
<body>
  <h1>Servidor temporariamente indisponível</h1>
  <p>O servidor demorou a responder. Isto pode ser temporário. Por favor, tente novamente em instantes.</p>
  <button type="button" onclick="window.location.reload()">Tentar novamente</button>
</body>
</html>
