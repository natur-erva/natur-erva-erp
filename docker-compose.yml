version: '3.8'

# ============================================================
# NaturErva ERP — Docker Compose
# Compatível com: Docker Compose v2, Coolify v4
#
# Variáveis obrigatórias (.env.production ou Coolify UI):
#   PG_PASSWORD, JWT_SECRET
#
# Variáveis opcionais (têm default):
#   PG_DATABASE, PG_USER, PORT, HTTP_PORT, JWT_EXPIRES_IN, FRONTEND_URL
# ============================================================

services:

  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: naturerva-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_DATABASE:-naturerva_erp}
      POSTGRES_USER: ${PG_USER:-naturerva}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-naturerva} -d ${PG_DATABASE:-naturerva_erp}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Backend API (Node.js / Express) ────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: naturerva-backend
    restart: unless-stopped
    environment:
      PORT: ${PORT:-3060}
      # Aponta para o container postgres interno
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DATABASE: ${PG_DATABASE:-naturerva_erp}
      PG_USER: ${PG_USER:-naturerva}
      PG_PASSWORD: ${PG_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3060/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Frontend (React + Nginx) ────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: naturerva-frontend
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app_network

# ── Volumes persistentes ────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

# ── Rede interna ────────────────────────────────────────────
networks:
  app_network:
    driver: bridge
